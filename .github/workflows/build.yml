name: Terraform - Create App Resources

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::373447294485:role/GitHubAction-Terraform-Role
        role-session-name: GitHubActionsSession
        aws-region: us-east-1

    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity
        echo "Role assumed successfully! ✅"

    # ─────────────────────────────────────────
    # STEP 1 - Bootstrap
    # Creates ONLY state backend resources
    # S3 bucket + DynamoDB for tfstate
    # NOT managed by Terraform!
    # ─────────────────────────────────────────
    - name: Bootstrap State Backend
      working-directory: .
      run: |
        STATE_BUCKET="custom-s3-terraform-state"
        LOCK_TABLE="custom-terraform-state-dynamodb-lock"
        REGION="us-east-1"

        echo "========================================="
        echo " Bootstrapping State Backend"
        echo " These resources store terraform state"
        echo " They are NOT managed by Terraform!"
        echo "========================================="

        # Create S3 state bucket if not exists
        if aws s3api head-bucket \
          --bucket $STATE_BUCKET 2>/dev/null; then
          echo "State bucket exists: $STATE_BUCKET ✅"
        else
          echo "Creating state bucket: $STATE_BUCKET"
          aws s3api create-bucket \
            --bucket $STATE_BUCKET \
            --region $REGION
          sleep 5
          aws s3api put-bucket-versioning \
            --bucket $STATE_BUCKET \
            --versioning-configuration Status=Enabled
          aws s3api put-bucket-encryption \
            --bucket $STATE_BUCKET \
            --server-side-encryption-configuration '{
              "Rules": [{
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }]
            }'
          aws s3api put-public-access-block \
            --bucket $STATE_BUCKET \
            --public-access-block-configuration \
              "BlockPublicAcls=true,\
               IgnorePublicAcls=true,\
               BlockPublicPolicy=true,\
               RestrictPublicBuckets=true"
          echo "State bucket created! ✅"
        fi

        # Create DynamoDB lock table if not exists
        if aws dynamodb describe-table \
          --table-name $LOCK_TABLE \
          --region $REGION 2>/dev/null; then
          echo "Lock table exists: $LOCK_TABLE ✅"
        else
          echo "Creating lock table: $LOCK_TABLE"
          aws dynamodb create-table \
            --table-name $LOCK_TABLE \
            --attribute-definitions \
              AttributeName=LockID,AttributeType=S \
            --key-schema \
              AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $REGION
          aws dynamodb wait table-exists \
            --table-name $LOCK_TABLE \
            --region $REGION
          echo "Lock table created! ✅"
        fi

        echo "========================================="
        echo " Bootstrap Complete!"
        echo " S3      : $STATE_BUCKET"
        echo " DynamoDB: $LOCK_TABLE"
        echo "========================================="

    # ─────────────────────────────────────────
    # STEP 2 - Setup Terraform
    # ─────────────────────────────────────────
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.0

    # ─────────────────────────────────────────
    # STEP 3 - Terraform Init
    # Connects to S3 state backend
    # ─────────────────────────────────────────
    - name: Terraform Init
      run: |
        terraform init
        echo "Connected to S3 state backend! ✅"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Format Check
      run: terraform fmt -check
      continue-on-error: true

    # ─────────────────────────────────────────
    # STEP 4 - Terraform Plan
    # Plans YOUR APP resources only
    # NOT the state backend resources!
    # ─────────────────────────────────────────
    - name: Terraform Plan
      run: |
        terraform plan \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=SpringBootApp" \
          -var="state_bucket_name=custom-s3-terraform-state" \
          -var="lock_table_name=custom-terraform-state-dynamodb-lock" \
          -var="app_bucket_name=springboot-app-bucket-prod" \
          -var="app_table_name=Products" \
          -out=tfplan
        echo "Terraform plan complete! ✅"

    # ─────────────────────────────────────────
    # STEP 5 - Terraform Apply
    # Creates YOUR APP resources
    # ─────────────────────────────────────────
    - name: Terraform Apply
      if: |
        github.ref == 'refs/heads/main' &&
        (github.event_name == 'push' ||
        github.event.inputs.action == 'apply')
      run: |
        terraform apply -auto-approve tfplan
        echo "App resources created! ✅"

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        terraform destroy -auto-approve \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=SpringBootApp" \
          -var="state_bucket_name=custom-s3-terraform-state" \
          -var="lock_table_name=custom-terraform-state-dynamodb-lock" \
          -var="app_bucket_name=springboot-app-bucket-prod" \
          -var="app_table_name=Products"

    - name: Show Outputs
      if: github.event.inputs.action != 'destroy'
      run: terraform output
