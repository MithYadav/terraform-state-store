name: Terraform - S3 and DynamoDB Backend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

# Required for OIDC
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
    # ─────────────────────────────────────────
    # STEP 1 - Checkout
    # ─────────────────────────────────────────
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ─────────────────────────────────────────
    # STEP 2 - Assume Role via OIDC
    # No Access Keys needed!
    # ─────────────────────────────────────────
    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::373447294485:role/GitHubAction-Terraform-Role
        role-session-name: GitHubActionsSession
        aws-region: us-east-1

    # ─────────────────────────────────────────
    # STEP 3 - Verify Role
    # ─────────────────────────────────────────
    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity
        echo "Role assumed successfully! ✅"

    # ─────────────────────────────────────────
    # STEP 4 - Bootstrap Backend
    # Create S3 + DynamoDB for state storage
    # ─────────────────────────────────────────
    - name: Bootstrap Terraform Backend
      working-directory: .
      run: |
        STATE_BUCKET="custom-s3-terraform-state"
        LOCK_TABLE="custom-terraform-state-dynamodb-lock"
        REGION="us-east-1"

        echo "========================================="
        echo " Bootstrapping Terraform Backend"
        echo "========================================="

        # ── Create S3 bucket if not exists ──
        if aws s3api head-bucket \
          --bucket $STATE_BUCKET 2>/dev/null; then
          echo "S3 bucket exists: $STATE_BUCKET ✅"
        else
          echo "Creating S3 bucket: $STATE_BUCKET"

          aws s3api create-bucket \
            --bucket $STATE_BUCKET \
            --region $REGION

          sleep 5

          aws s3api put-bucket-versioning \
            --bucket $STATE_BUCKET \
            --versioning-configuration Status=Enabled
          echo "Versioning enabled! ✅"

          aws s3api put-bucket-encryption \
            --bucket $STATE_BUCKET \
            --server-side-encryption-configuration '{
              "Rules": [{
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }]
            }'
          echo "Encryption enabled! ✅"

          aws s3api put-public-access-block \
            --bucket $STATE_BUCKET \
            --public-access-block-configuration \
              "BlockPublicAcls=true,\
               IgnorePublicAcls=true,\
               BlockPublicPolicy=true,\
               RestrictPublicBuckets=true"
          echo "Public access blocked! ✅"

          echo "S3 bucket created: $STATE_BUCKET ✅"
        fi

        # ── Create DynamoDB lock table if not exists ──
        if aws dynamodb describe-table \
          --table-name $LOCK_TABLE \
          --region $REGION 2>/dev/null; then
          echo "DynamoDB table exists: $LOCK_TABLE ✅"
        else
          echo "Creating DynamoDB table: $LOCK_TABLE"

          aws dynamodb create-table \
            --table-name $LOCK_TABLE \
            --attribute-definitions \
              AttributeName=LockID,AttributeType=S \
            --key-schema \
              AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $REGION

          aws dynamodb wait table-exists \
            --table-name $LOCK_TABLE \
            --region $REGION

          echo "DynamoDB table created: $LOCK_TABLE ✅"
        fi

        echo "========================================="
        echo " Backend Bootstrap Complete!"
        echo " S3      : $STATE_BUCKET"
        echo " DynamoDB: $LOCK_TABLE"
        echo "========================================="

    # ─────────────────────────────────────────
    # STEP 5 - Setup Terraform
    # ─────────────────────────────────────────
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.0

    # ─────────────────────────────────────────
    # STEP 6 - Terraform Init
    # ─────────────────────────────────────────
    - name: Terraform Init
      run: |
        terraform init
        echo "Terraform initialized! ✅"

    # ─────────────────────────────────────────
    # STEP 7 - Terraform Validate
    # ─────────────────────────────────────────
    - name: Terraform Validate
      run: |
        terraform validate
        echo "Terraform valid! ✅"

    # ─────────────────────────────────────────
    # STEP 8 - Terraform Format Check
    # ─────────────────────────────────────────
    - name: Terraform Format Check
      run: terraform fmt -check
      continue-on-error: true

    # ─────────────────────────────────────────
    # STEP 9 - Terraform Plan
    # ─────────────────────────────────────────
    - name: Terraform Plan
      run: |
        terraform plan \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=SpringBootApp" \
          -var="state_bucket_name=custom-s3-terraform-state" \
          -var="lock_table_name=custom-terraform-state-dynamodb-lock" \
          -out=tfplan
        echo "Terraform plan complete! ✅"

    # ─────────────────────────────────────────
    # STEP 10 - Terraform Apply
    # Runs on push to main or manual apply
    # ─────────────────────────────────────────
    - name: Terraform Apply
      if: |
        github.ref == 'refs/heads/main' &&
        (github.event_name == 'push' ||
        github.event.inputs.action == 'apply')
      run: |
        terraform apply -auto-approve tfplan
        echo "Terraform apply complete! ✅"

    # ─────────────────────────────────────────
    # STEP 11 - Terraform Destroy
    # Only on manual trigger with destroy action
    # ─────────────────────────────────────────
    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        terraform destroy -auto-approve \
          -var="aws_region=us-east-1" \
          -var="environment=prod" \
          -var="project_name=SpringBootApp" \
          -var="state_bucket_name=custom-s3-terraform-state" \
          -var="lock_table_name=custom-terraform-state-dynamodb-lock"
        echo "Terraform destroy complete! ✅"

    # ─────────────────────────────────────────
    # STEP 12 - Show Outputs
    # ─────────────────────────────────────────
    - name: Show Outputs
      if: github.event.inputs.action != 'destroy'
      run: |
        echo "========================================="
        echo "  FINAL OUTPUTS"
        echo "========================================="
        terraform output
        echo "========================================="
        echo "  STATE FILE LOCATION"
        echo "  Bucket : custom-s3-terraform-state"
        echo "  Key    : infra/terraform.tfstate"
        echo "  Lock   : custom-terraform-state-dynamodb-lock"
        echo "========================================="
